name: release-runtime-assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number without leading v (example: 1.0.1)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-and-upload:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.target == 'aarch64-unknown-linux-gnu' }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    env:
      TARGET: ${{ matrix.target }}
      CURL_IMPERSONATE_IMAGE_AMD64: lexiforest/curl-impersonate:v1.5.1@sha256:0e43f7ef4007ce957fcd6532f4295d0193f9178f4e6eccb1a6f754d64f7f9fcd
      CURL_IMPERSONATE_IMAGE_ARM64: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RAW="${GITHUB_REF_NAME}"
            VERSION="${RAW#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=impcurl-runtime-v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Resolve runtime image
        id: runtime-image
        run: |
          if [[ "${TARGET}" == "x86_64-unknown-linux-gnu" ]]; then
            echo "image=${CURL_IMPERSONATE_IMAGE_AMD64}" >> "${GITHUB_OUTPUT}"
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${TARGET}" == "aarch64-unknown-linux-gnu" ]]; then
            if [[ -z "${CURL_IMPERSONATE_IMAGE_ARM64}" ]]; then
              echo "No ARM64 runtime image configured, skipping ${TARGET} packaging."
              echo "skip=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            echo "image=${CURL_IMPERSONATE_IMAGE_ARM64}" >> "${GITHUB_OUTPUT}"
            echo "skip=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Unsupported TARGET=${TARGET}" >&2
          exit 1

      - name: Build runtime assets
        if: steps.runtime-image.outputs.skip != 'true'
        env:
          CURL_IMPERSONATE_IMAGE: ${{ steps.runtime-image.outputs.image }}
        run: |
          ./scripts/package_runtime_assets.sh "${{ steps.version.outputs.version }}" "${TARGET}"

      - name: Verify runtime asset size/content
        if: steps.runtime-image.outputs.skip != 'true'
        run: |
          TGZ="dist/runtime-assets/impcurl-runtime-v${{ steps.version.outputs.version }}-${TARGET}.tar.gz"
          SIZE="$(wc -c < "${TGZ}" | tr -d ' ')"
          echo "asset size bytes=${SIZE}"
          if [[ "${SIZE}" -lt 1000000 ]]; then
            echo "runtime asset is unexpectedly small" >&2
            exit 1
          fi
          tar -tzf "${TGZ}"

      - name: Create runtime release
        if: steps.runtime-image.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Versioned libcurl-impersonate runtime assets for impcurl auto-fetch." \
            dist/runtime-assets/impcurl-runtime-v${{ steps.version.outputs.version }}-${TARGET}.tar.gz \
            dist/runtime-assets/impcurl-runtime-v${{ steps.version.outputs.version }}-${TARGET}.sha256 \
          || gh release upload "${{ steps.version.outputs.tag }}" \
            --clobber \
            dist/runtime-assets/impcurl-runtime-v${{ steps.version.outputs.version }}-${TARGET}.tar.gz \
            dist/runtime-assets/impcurl-runtime-v${{ steps.version.outputs.version }}-${TARGET}.sha256
