name: release-runtime-assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number without leading v (example: 1.0.1)"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-and-upload:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    env:
      TARGET: ${{ matrix.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RAW="${GITHUB_REF_NAME}"
            VERSION="${RAW#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=impcurl-runtime-v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build runtime assets
        run: |
          ./scripts/package_runtime_assets.sh "${{ steps.version.outputs.version }}" "${TARGET}"

      - name: Verify runtime asset size/content
        run: |
          TGZ="dist/runtime-assets/impcurl-runtime-v${{ steps.version.outputs.version }}-${TARGET}.tar.gz"
          SIZE="$(wc -c < "${TGZ}" | tr -d ' ')"
          echo "asset size bytes=${SIZE}"
          if [[ "${SIZE}" -lt 1000000 ]]; then
            echo "runtime asset is unexpectedly small" >&2
            exit 1
          fi
          tar -tzf "${TGZ}"

      - name: Create runtime release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Versioned libcurl-impersonate runtime assets for impcurl auto-fetch." \
            dist/runtime-assets/impcurl-runtime-v${{ steps.version.outputs.version }}-${TARGET}.tar.gz \
            dist/runtime-assets/impcurl-runtime-v${{ steps.version.outputs.version }}-${TARGET}.sha256 \
          || gh release upload "${{ steps.version.outputs.tag }}" \
            --clobber \
            dist/runtime-assets/impcurl-runtime-v${{ steps.version.outputs.version }}-${TARGET}.tar.gz \
            dist/runtime-assets/impcurl-runtime-v${{ steps.version.outputs.version }}-${TARGET}.sha256
